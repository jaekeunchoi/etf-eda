name: Update ETF Data

on:
  schedule:
    - cron: '*/5 * * * *' # 매 5분마다 실행 (GitHub Actions 제약 우회 및 1분 수집을 위해)
  workflow_dispatch: # 수동 실행 지원

permissions:
  contents: write # 데이터를 커밋하고 푸시하기 위해 쓰기 권한 허용

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt

      - name: Run ETF data collector
        run: |
          # 60초(1분) 주기로 260초(4분 20초) 동안 루프를 돌며 총 5회 실시간 데이터를 수집하여 data/에 저장
          python src/fetch_etf.py --loop --interval 60 --duration 260

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          
          # 변경 사항이 있는 경우에만 커밋 및 푸시 수행
          if ! git diff --cached --quiet; then
            git commit -m "auto: update ETF data (1min loop)"
            git push
          else
            echo "No changes detected in data. Skipping push."
          fi
